# LAVA Job Definition – ROM-2620 ED91 ModBSP RTC Suspend/Wakeup Test
# This is a SEPARATE job because suspend-to-RAM resets the LAVA serial session.
#
# LAVA handles recovery by waiting for the board to reboot, re-login, and
# re-run the post-resume test phase via the expect_response pattern.
#
# Fill in device_type and deploy/boot as for the main job.
---
device_type: advantech-rom2620  # TODO: set to your lab's device type
job_name: "Advantech ROM-2620 ED91 – RTC Suspend/Wakeup"
visibility: public
priority: medium

timeouts:
  job:
    minutes: 15
  action:
    minutes: 5
  connection:
    minutes: 5

metadata:
  source: https://github.com/miketsukerman/yocto-auto
  board: ROM-2620-ED91
  bsp: ModBSP
  test: rtc-suspend

actions:

  - deploy:
      timeout:
        minutes: 10
      to: tftp
      kernel:
        url: http://images.example.com/rom2620/Image  # TODO
        type: image
      dtb:
        url: http://images.example.com/rom2620/rom2620-ed91-modbsp.dtb  # TODO
      ramdisk:
        url: http://images.example.com/rom2620/rootfs.cpio.gz  # TODO
        compression: gz

  - boot:
      timeout:
        minutes: 5
      method: u-boot
      commands: nfs
      auto_login:
        login_prompt: "login:"
        username: root
      prompts:
        - "root@.*:.*#"
        - "\\$"

  - test:
      timeout:
        minutes: 10
      definitions:
        - repository: https://github.com/miketsukerman/yocto-auto.git
          from: git
          branch: main
          path: qa/lava/rtc/rtc-suspend.yaml
          name: adv-rtc-suspend
          parameters:
            RTC_DEV: /dev/rtc0
            SLEEP_STATE: mem
            WAKE_SLEEP_TIME_S: "5"
