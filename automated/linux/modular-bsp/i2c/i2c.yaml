metadata:
  format: Lava-Test-Definition 1.0
  name: adv-i2c
  description: >
    Advantech BSP QA – I2C bus checks: verifies that each configured
    /dev/i2c-N device node exists, is readable/writable, and that the
    expected controller name is reported by i2cdetect.
  maintainer:
    - qa@advantech.com
  os:
    - yocto
    - debian
  scope:
    - functional
  devices:
    - all

params:
  I2C_COUNT: "1"               # Number of I2C buses to check
  I2C0_DEV: "/dev/i2c-0"      # Device node
  I2C0_CONTROLLER: ""          # Expected controller name (from i2cdetect -l)
  I2C0_REFERENCE: ""           # Human reference (informational only)
  # I2C1_DEV, I2C1_CONTROLLER, I2C1_REFERENCE, … for additional buses

run:
  steps:
    - cd "${TESTPATH}"
    - bash i2c.sh
    - bash ../utils/send-to-lava.sh ./output/result.txt
